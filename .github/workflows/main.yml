name: Train Model

on:
  push:

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install mlflow==2.19.0
          pip install pandas
          pip install scikit-learn

      - name: Train Model
        run: |
          cd MLProject
          python modelling.py